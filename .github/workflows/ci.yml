name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.20
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Install deps
        run: go mod download
      - name: Tidy modules
        run: |
          go mod tidy
      - name: Format check
        run: |
          # Fail if any Go files are not formatted
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt check failed - files need formatting:";
            gofmt -l .;
            exit 1;
          fi
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: discord-bot-api:ci
